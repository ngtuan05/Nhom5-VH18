<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính thành tiền</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Tính thành tiền</h2>

        <!-- Số lượng -->
        <div class="mb-3">
            <label class="form-label">Số lượng</label>
            <input type="number" id="SoLuong" class="form-control" value="0">
        </div>

        <!-- Đơn giá -->
        <div class="mb-3">
            <label class="form-label">Đơn giá</label>
            <input type="number" id="DonGia" class="form-control"
                   onkeyup="TinhTien()" value="0">
        </div>

        <!-- Thành tiền -->
        <div class="mb-3">
            <label class="form-label">Thành tiền</label>
            <input type="text" id="ThanhTien" class="form-control" readonly>
        </div>
    </div>
</div>

<script>
    function TinhTien() {
        let soLuong = document.getElementById("SoLuong").value;
        let donGia = document.getElementById("DonGia").value;

        let thanhTien = Number(soLuong) * Number(donGia);

        document.getElementById("ThanhTien").value = thanhTien;
    }
</script>

</body>
</html>
