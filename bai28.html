<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Background Image Demo</title>

    <style>
        body {
            font-family: Arial;
            background-image: url('anh1.jpg');
            background-repeat: no-repeat;
            background-size: cover; /* cho đẹp hơn */
        }

        input {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            background-image: url('anh2.jpg');
            background-repeat: repeat-x;
            border: 1px solid #ccc;
            padding: 5px;
        }

        textarea {
            width: 100%;
            background-image: url('anh3.jpg');
            background-repeat: repeat-y;
            border: 1px solid #ccc;
            padding: 10px;
        }
    </style>
</head>

<body>

<h2>Demo đặt ảnh nền</h2>

<!-- Textbox -->
<input type="text" placeholder="Nhập nội dung...">

<!-- Textarea -->
<textarea cols="80" rows="10" placeholder="Nhập nhiều dòng..."></textarea>

</body>
</html>
