<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
  </head>

  <body class="container mt-5">
    <form onsubmit="return validate();" class="w-50 mx-auto border p-4 rounded">
      <h3 class="text-center mb-3">Kiểm tra dữ liệu</h3>

      <div class="mb-3">
        <label>Nhập số:</label>
        <input type="text" id="num1" class="form-control" />
      </div>
      <div class="mb-3">
        <label>Lặp lại:</label>
        <input type="text" id="num2" class="form-control" />
      </div>
      <button type="submit" class="btn btn-primary w-100">Submit</button>
    </form>

    <script>
      function validate() {
        var n1 = document.getElementById("num1");
        var n2 = document.getElementById("num2");
        if (n1.value != "" && n2.value != "") {
          if (n1.value == n2.value) {
            return true;
          }
        }
        alert("Dư liệu không được để trống, không được giống nhau");
        return false;
      }
    </script>
  </body>
</html>
